server:
  port: 8080

filesever:
  # Storage backend: local (default), s3, obs
  storage:
    type: local
    s3:
      bucket: my-s3-bucket
      region: us-east-1
      access-key: YOUR_AWS_ACCESS_KEY
      secret-key: YOUR_AWS_SECRET_KEY
    obs:
      bucket: my-obs-bucket
      endpoint: obs.cn-north-4.myhuaweicloud.com
      access-key: YOUR_OBS_ACCESS_KEY
      secret-key: YOUR_OBS_SECRET_KEY

  ssh:
    port: 2222
    host-key-dir: ./hostkeys
    disable-host-key-ip-check: true
    users:
      - username: admin
        password: admin
      - username: user1
        password: user1
  ftps:
    port: 21
    implicit-ssl: false
    keystore-password: filesever
    keystore-file: ./ftps.jks
  file:
    storage-dir: ./files

spring:
  servlet:
    multipart:
      max-file-size: 1GB
      max-request-size: 1GB
