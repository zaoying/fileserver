name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: |
          set +o pipefail
          mvn package -B -e -DskipTests 2>&1 | tee maven-build.log
          exit ${PIPESTATUS[0]}

      - name: Write build log to summary
        if: always()
        run: |
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat maven-build.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload build log to pastebin
        if: always()
        run: |
          URL=$(curl -s -F 'f:1=@maven-build.log' https://ix.io 2>&1)
          echo "BUILD_LOG_URL=$URL" >> $GITHUB_ENV
          echo "Build log URL: $URL" >> $GITHUB_STEP_SUMMARY

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-build-log
          path: maven-build.log

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: filesever-jar
          path: target/*.jar
