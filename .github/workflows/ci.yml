name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: |
          set +o pipefail
          mvn package -B -e -DskipTests 2>&1 | tee maven-build.log
          exit ${PIPESTATUS[0]}

      - name: Write build log to summary
        if: always()
        run: |
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat maven-build.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload build log as issue
        if: always()
        run: |
          {
            echo "Build log from run ${{ github.run_id }}:"
            echo '```'
            cat maven-build.log
            echo '```'
          } > body.md
          gh issue create --title "Build failure log $(date +%s)" \
            --body-file body.md 2>&1 || echo "Issue creation failed"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-build-log
          path: maven-build.log

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: filesever-jar
          path: target/*.jar
