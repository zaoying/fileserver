name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: |
          set +o pipefail
          mvn package -B -e -DskipTests 2>&1 | tee maven-build.log
          exit ${PIPESTATUS[0]}

      - name: Write build log to summary
        if: always()
        run: |
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat maven-build.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload build log as issue
        if: always()
        run: |
          TITLE="Build failure log $(date +%s)"
          BODY=$(cat maven-build.log | head -c 60000)
          jq -n --arg title "$TITLE" --arg body "$BODY" '{title: $title, body: $body}' > issue.json
          curl -s -X POST \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues" \
            -d @issue.json

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-build-log
          path: maven-build.log

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: filesever-jar
          path: target/*.jar
