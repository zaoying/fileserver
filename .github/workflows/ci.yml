name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: |
          set +o pipefail
          mvn package -B -e -DskipTests 2>&1 | tee maven-build.log
          exit ${PIPESTATUS[0]}

      - name: Write build log to summary
        if: always()
        run: |
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat maven-build.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Publish build log to check run
        if: always()
        run: |
          JOBS=$(curl -s -H "Authorization: Bearer ${{ github.token }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=50")
          CHECK_RUN_ID=$(echo "$JOBS" | jq '.jobs[] | select(.name == "build") | .id')
          echo "CHECK_RUN_ID=$CHECK_RUN_ID" >> $GITHUB_ENV
          LOG=$(cat maven-build.log)
          jq -n --arg title "Maven Build" --arg log "$LOG" '{output: {title: $title, text: $log}}' > check-run-payload.json
          curl -s -L -X PATCH \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/check-runs/$CHECK_RUN_ID" \
            -d @check-run-payload.json

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-build-log
          path: maven-build.log

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: filesever-jar
          path: target/*.jar
